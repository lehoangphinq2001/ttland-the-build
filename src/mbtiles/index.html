<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vector Tile · Line Inspector</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #080b10;
        --surf: #0d1117;
        --surf2: #131920;
        --border: #1c2535;
        --border2: #243044;
        --accent: #3dffa0;
        --accent2: #ff6b6b;
        --accent3: #ffd166;
        --blue: #4da6ff;
        --text: #d4dce8;
        --muted: #4a5a72;
        --muted2: #2a3548;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      /* ══ TOPBAR ══════════════════════════════════════════════════════════ */
      .topbar {
        height: 48px;
        background: var(--surf);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
        z-index: 20;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-right: 8px;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        background: conic-gradient(
          from 0deg,
          var(--accent),
          var(--blue),
          var(--accent2),
          var(--accent)
        );
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }

      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: var(--text);
      }

      .brand-name em {
        font-style: normal;
        color: var(--accent);
      }

      .topbar-divider {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 4px;
      }

      /* URL input in topbar */
      .url-group {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 0 10px;
        height: 32px;
      }

      .url-group:focus-within {
        border-color: var(--accent);
      }

      .url-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--muted);
        white-space: nowrap;
        letter-spacing: 0.1em;
      }

      .url-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--accent);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
      }

      .url-input::placeholder {
        color: var(--muted);
      }

      .layer-input {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        padding: 0 10px;
        height: 32px;
        width: 160px;
        outline: none;
      }

      .layer-input:focus {
        border-color: var(--accent);
      }

      .btn-load {
        height: 32px;
        padding: 0 16px;
        background: var(--accent);
        color: #050a05;
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s, transform 0.1s;
      }

      .btn-load:hover {
        background: #5fffb2;
        transform: translateY(-1px);
      }
      .btn-load:active {
        transform: translateY(0);
      }

      .btn-clear {
        height: 32px;
        padding: 0 12px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 7px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn-clear:hover {
        color: var(--accent2);
        border-color: var(--accent2);
      }

      /* ══ LAYOUT ══════════════════════════════════════════════════════════ */
      .workspace {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ══ PANEL ═══════════════════════════════════════════════════════════ */
      .panel {
        width: 272px;
        background: var(--surf);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .panel::-webkit-scrollbar {
        width: 3px;
      }
      .panel::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      .pblock {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .ptitle {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .ptitle::before {
        content: '';
        display: inline-block;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--accent);
      }

      /* Form controls */
      .field {
        margin-bottom: 10px;
      }

      .field label {
        display: block;
        font-size: 10px;
        color: var(--muted);
        font-family: 'IBM Plex Mono', monospace;
        margin-bottom: 4px;
        letter-spacing: 0.05em;
      }

      .field input[type='range'] {
        width: 100%;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .field-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .field-val {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        color: var(--accent);
        min-width: 32px;
        text-align: right;
      }

      /* Color */
      .color-pick {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      input[type='color'] {
        width: 34px;
        height: 34px;
        border-radius: 6px;
        border: 1px solid var(--border2);
        background: none;
        padding: 2px;
        cursor: pointer;
        flex-shrink: 0;
      }

      .hex-in {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        padding: 6px 10px;
        outline: none;
      }

      .hex-in:focus {
        border-color: var(--accent);
      }

      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        padding: 7px 10px;
        outline: none;
        cursor: pointer;
        margin-bottom: 10px;
      }

      select:focus {
        border-color: var(--accent);
      }

      /* Status */
      .status-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .led {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted2);
        flex-shrink: 0;
        transition: background 0.3s;
      }

      .led.ready {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }
      .led.busy {
        background: var(--accent3);
        animation: blink 0.8s infinite;
      }
      .led.error {
        background: var(--accent2);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      .led-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Stats */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
        margin-bottom: 10px;
      }

      .stat {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 8px 6px;
        text-align: center;
      }

      .stat-n {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 15px;
        font-weight: 600;
        color: var(--accent);
        line-height: 1;
      }

      .stat-n.red {
        color: var(--accent2);
      }
      .stat-n.yel {
        color: var(--accent3);
      }

      .stat-t {
        font-size: 9px;
        color: var(--muted);
        margin-top: 4px;
        letter-spacing: 0.04em;
      }

      /* Presets */
      .preset-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .preset-btn {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 11px;
        padding: 7px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
      }

      .preset-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: #3dffa008;
      }

      /* Log */
      .log {
        flex: 1;
        min-height: 0;
      }

      .log-inner {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 8px;
        height: 140px;
        overflow-y: auto;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        line-height: 1.75;
      }

      .log-inner::-webkit-scrollbar {
        width: 3px;
      }
      .log-inner::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      .ll {
        color: var(--muted);
      }
      .ll-ok {
        color: var(--accent);
      }
      .ll-er {
        color: var(--accent2);
      }
      .ll-in {
        color: var(--blue);
      }
      .ll-w {
        color: var(--accent3);
      }

      /* ══ MAP ═════════════════════════════════════════════════════════════ */
      #map {
        flex: 1;
        position: relative;
        background: var(--bg);
      }

      /* HUD overlays */
      .hud {
        position: absolute;
        pointer-events: none;
        z-index: 5;
      }

      .hud-zoom {
        top: 14px;
        right: 14px;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 8px 14px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        color: var(--muted);
      }

      .hud-zoom b {
        font-size: 20px;
        color: var(--accent);
        font-weight: 600;
        display: block;
        line-height: 1;
      }

      .hud-coords {
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 14px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        color: var(--accent);
        white-space: nowrap;
      }

      .hud-tile {
        top: 14px;
        left: 14px;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 8px 12px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--muted);
        line-height: 1.8;
      }

      .hud-tile b {
        color: var(--accent2);
      }

      /* Crosshair */
      .xhair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 4;
      }

      .xhair::before,
      .xhair::after {
        content: '';
        position: absolute;
        background: var(--accent);
        opacity: 0.35;
      }

      .xhair::before {
        width: 1px;
        height: 20px;
        left: 0;
        top: -10px;
      }
      .xhair::after {
        width: 20px;
        height: 1px;
        top: 0;
        left: -10px;
      }

      /* MapLibre overrides */
      .maplibregl-ctrl-bottom-right,
      .maplibregl-ctrl-attrib {
        display: none !important;
      }

      .maplibregl-popup-content {
        background: var(--surf2) !important;
        border: 1px solid var(--border2) !important;
        border-radius: 8px !important;
        color: var(--text) !important;
        font-family: 'IBM Plex Mono', monospace !important;
        font-size: 11px !important;
        padding: 10px 14px !important;
        line-height: 1.9 !important;
        max-width: 280px !important;
      }

      .maplibregl-popup-tip {
        display: none !important;
      }
      .maplibregl-popup-close-button {
        color: var(--muted) !important;
        font-size: 16px !important;
        padding: 4px 8px !important;
      }
    </style>
  </head>
  <body>
    <!-- ══ TOPBAR ═══════════════════════════════════════════════════════════════ -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">⬡</div>
        <div class="brand-name">VEC<em>LINE</em></div>
      </div>
      <div class="topbar-divider"></div>

      <div class="url-group">
        <span class="url-label">TILE URL</span>
        <input
          class="url-input"
          id="tileUrl"
          type="text"
          value="http://45.119.83.59:3333/v1/mbtiles/line/{z}/{x}/{y}"
          placeholder="http://host/v1/mbtiles/line/{z}/{x}/{y}"
        />
      </div>

      <input
        class="layer-input"
        id="sourceLayer"
        type="text"
        value="thongtinland"
        placeholder="source-layer name"
      />

      <button class="btn-load" onclick="loadLayer()">▶ LOAD</button>
      <button class="btn-clear" onclick="clearLayer()">✕</button>
    </div>

    <!-- ══ WORKSPACE ════════════════════════════════════════════════════════════ -->
    <div class="workspace">
      <!-- ══ PANEL ════════════════════════════════════════════════════════ -->
      <div class="panel">
        <!-- Style controls -->
        <div class="pblock">
          <div class="ptitle">Line Style</div>

          <div class="color-pick">
            <input
              type="color"
              id="clrPick"
              value="#3dffa0"
              oninput="syncColor(this.value,'clrHex'); applyStyle()"
            />
            <input
              class="hex-in"
              id="clrHex"
              type="text"
              value="#3dffa0"
              oninput="syncColor(this.value,'clrPick'); applyStyle()"
            />
          </div>

          <div class="field">
            <label>WIDTH</label>
            <div class="field-row">
              <input
                type="range"
                id="lineW"
                min="0.5"
                max="10"
                step="0.5"
                value="2"
                oninput="$('lineWVal').textContent=this.value; applyStyle()"
              />
              <span class="field-val" id="lineWVal">2</span>
            </div>
          </div>

          <div class="field">
            <label>OPACITY</label>
            <div class="field-row">
              <input
                type="range"
                id="lineOp"
                min="0"
                max="1"
                step="0.05"
                value="1"
                oninput="$('lineOpVal').textContent=this.value; applyStyle()"
              />
              <span class="field-val" id="lineOpVal">1</span>
            </div>
          </div>

          <div class="field">
            <label>BLUR</label>
            <div class="field-row">
              <input
                type="range"
                id="lineBlur"
                min="0"
                max="4"
                step="0.5"
                value="0"
                oninput="$('lineBlurVal').textContent=this.value; applyStyle()"
              />
              <span class="field-val" id="lineBlurVal">0</span>
            </div>
          </div>

          <div class="field">
            <label>DASH PATTERN</label>
            <select id="lineDash" onchange="applyStyle()">
              <option value="">──────── Solid</option>
              <option value="6,3">- - - - - Dashed</option>
              <option value="1,3">· · · · · Dotted</option>
              <option value="8,2,1,2">─·─·─ Dash-dot</option>
            </select>
          </div>

          <div class="field">
            <label>MIN ZOOM (show layer from)</label>
            <div class="field-row">
              <input
                type="range"
                id="minZ"
                min="0"
                max="18"
                step="1"
                value="10"
                oninput="$('minZVal').textContent=this.value; applyStyle()"
              />
              <span class="field-val" id="minZVal">10</span>
            </div>
          </div>

          <div class="field">
            <label>BASE MAP</label>
            <select id="basemap" onchange="switchBasemap(this.value)">
              <option value="osm">OpenStreetMap</option>
              <option value="dark">Dark (CartoDB)</option>
              <option value="satellite">Satellite (ESRI)</option>
              <option value="topo">Topo (OpenTopoMap)</option>
            </select>
          </div>
        </div>

        <!-- Status -->
        <div class="pblock">
          <div class="ptitle">Status</div>
          <div class="status-pill">
            <div class="led" id="led"></div>
            <div class="led-label" id="ledLabel">Chưa load layer</div>
          </div>
          <div class="stats">
            <div class="stat">
              <div class="stat-n" id="sTiles">0</div>
              <div class="stat-t">Tiles</div>
            </div>
            <div class="stat">
              <div class="stat-n yel" id="sEmpty">0</div>
              <div class="stat-t">Empty</div>
            </div>
            <div class="stat">
              <div class="stat-n red" id="sErr">0</div>
              <div class="stat-t">Errors</div>
            </div>
          </div>
        </div>

        <!-- Navigate -->
        <div class="pblock">
          <div class="ptitle">Quick Navigate</div>
          <div class="preset-grid">
            <div class="preset-btn" onclick="fly(10.045,105.748,13)">
              📍 Cần Thơ
            </div>
            <div class="preset-btn" onclick="fly(10.823,106.629,12)">🏙 HCM</div>
            <div class="preset-btn" onclick="fly(21.028,105.834,12)">
              🏛 Hà Nội
            </div>
            <div class="preset-btn" onclick="fly(16.047,108.206,12)">
              🌊 Đà Nẵng
            </div>
            <div class="preset-btn" onclick="fly(10.357,107.084,13)">
              ⛵ Vũng Tàu
            </div>
            <div class="preset-btn" onclick="fly(15.880,108.335,13)">
              🏮 Hội An
            </div>
          </div>
        </div>

        <!-- Debug log -->
        <div class="pblock log">
          <div class="ptitle" style="justify-content: space-between">
            Console
            <span
              onclick="clearLog()"
              style="
                cursor: pointer;
                font-size: 9px;
                letter-spacing: normal;
                color: var(--muted);
                text-transform: none;
                font-family: inherit;
              "
            >
              clear
            </span>
          </div>
          <div class="log-inner" id="logBox"></div>
        </div>
      </div>

      <!-- ══ MAP ═══════════════════════════════════════════════════════════ -->
      <div id="map">
        <div class="xhair"></div>
        <div class="hud hud-zoom">Z <b id="zoomVal">13.0</b></div>
        <div class="hud hud-tile" id="hudTile">No layer loaded</div>
        <div class="hud hud-coords" id="hudCoords">10.04520, 105.74690</div>
      </div>
    </div>

    <script>
      /* ── helpers ─────────────────────────────────────────────────────────── */
      const $ = (id) => document.getElementById(id);

      function syncColor(val, targetId) {
        try {
          $(targetId).value = val;
        } catch {}
      }

      function log(msg, type = '') {
        const b = $('logBox');
        const now = new Date();
        const ts = [now.getHours(), now.getMinutes(), now.getSeconds()]
          .map((n) => String(n).padStart(2, '0'))
          .join(':');
        const el = document.createElement('div');
        el.className = 'll' + (type ? '-' + type : '');
        el.textContent = `[${ts}] ${msg}`;
        b.appendChild(el);
        while (b.children.length > 120) b.removeChild(b.firstChild);
        b.scrollTop = b.scrollHeight;
      }

      function clearLog() {
        $('logBox').innerHTML = '';
      }

      function setStatus(state, msg) {
        const led = $('led');
        led.className = 'led' + (state ? ' ' + state : '');
        $('ledLabel').textContent = msg;
      }

      let tileOk = 0,
        tileEmpty = 0,
        tileErr = 0;

      function resetCounters() {
        tileOk = tileEmpty = tileErr = 0;
        $('sTiles').textContent =
          $('sEmpty').textContent =
          $('sErr').textContent =
            '0';
      }

      function updateCounters() {
        $('sTiles').textContent = tileOk;
        $('sEmpty').textContent = tileEmpty;
        $('sErr').textContent = tileErr;
      }

      /* ── basemap tiles ───────────────────────────────────────────────────── */
      const BASEMAPS = {
        osm: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        satellite:
          'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        topo: 'https://{a}.tile.opentopomap.org/{z}/{x}/{y}.png',
      };

      /* ── map init ────────────────────────────────────────────────────────── */
      const map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources: {
            basemap: {
              type: 'raster',
              tiles: [BASEMAPS.osm],
              tileSize: 256,
            },
          },
          layers: [
            {
              id: 'basemap-layer',
              type: 'raster',
              source: 'basemap',
              paint: {
                'raster-opacity': 0.82,
                'raster-saturation': -0.3,
                'raster-brightness-min': 0.05,
              },
            },
          ],
        },
        center: [105.748, 10.045],
        zoom: 13,
        maxZoom: 18,
        // ✅ Force GET + correct Accept header for all vector tile requests
        transformRequest: (url, resourceType) => {
          if (resourceType === 'Tile' && url.includes('/mbtiles/line/')) {
            return {
              url,
              method: 'GET',
              headers: {
                Accept: 'application/x-protobuf',
              },
            };
          }
        },
      });

      function switchBasemap(key) {
        const url = BASEMAPS[key];
        if (!url || !map.getSource('basemap')) return;
        map.getSource('basemap').setTiles([url]);
        log(`Basemap → ${key}`, 'in');
      }

      /* ── layer management ────────────────────────────────────────────────── */
      let layerActive = false;

      function clearLayer() {
        ['line-layer-casing', 'line-layer'].forEach((id) => {
          if (map.getLayer(id)) map.removeLayer(id);
        });
        if (map.getSource('vec-line')) map.removeSource('vec-line');
        layerActive = false;
        resetCounters();
        setStatus('', 'Layer cleared');
        $('hudTile').textContent = 'No layer loaded';
        log('Layer removed', 'w');
      }

      function loadLayer() {
        const url = $('tileUrl').value.trim();
        const sourceLayer = $('sourceLayer').value.trim() || 'thongtinland';

        if (!url) {
          log('❌ Missing tile URL', 'er');
          return;
        }

        clearLayer();
        resetCounters();
        setStatus('busy', 'Loading…');
        log(`▶ Load: ${url}`, 'in');
        log(`  source-layer: "${sourceLayer}"`, 'in');

        // ✅ Vector tile source – protobuf format
        map.addSource('vec-line', {
          type: 'vector',
          tiles: [url],
          minzoom: 0,
          maxzoom: 18,
          // ✅ Quan trọng: tắt promoteId nếu không cần feature state
        });

        const color = $('clrPick').value;
        const width = parseFloat($('lineW').value);
        const opac = parseFloat($('lineOp').value);
        const blur = parseFloat($('lineBlur').value);
        const minZ = parseInt($('minZ').value);
        const dash = $('lineDash').value
          ? $('lineDash').value.split(',').map(Number)
          : undefined;

        // ✅ Casing layer (outline) cho dễ nhìn trên mọi nền
        map.addLayer({
          id: 'line-layer-casing',
          type: 'line',
          source: 'vec-line',
          'source-layer': sourceLayer,
          minzoom: minZ,
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': '#000000',
            'line-width': [
              'interpolate',
              ['linear'],
              ['zoom'],
              10,
              width + 1.5,
              18,
              width + 2.5,
            ],
            'line-opacity': opac * 0.35,
            'line-blur': 1,
          },
        });

        // ✅ Main line layer
        const paint = {
          'line-color': color,
          'line-width': [
            'interpolate',
            ['linear'],
            ['zoom'],
            10,
            width,
            18,
            width * 1.6,
          ],
          'line-opacity': opac,
          'line-blur': blur,
        };
        if (dash) paint['line-dasharray'] = dash;

        map.addLayer({
          id: 'line-layer',
          type: 'line',
          source: 'vec-line',
          'source-layer': sourceLayer,
          minzoom: minZ,
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint,
        });

        layerActive = true;

        // ✅ Track tile events
        map.on('data', (e) => {
          if (e.sourceId !== 'vec-line') return;
          if (e.dataType === 'source' && e.isSourceLoaded) {
            setStatus('ready', `Loaded · source-layer: ${sourceLayer}`);
            $(
              'hudTile',
            ).innerHTML = `src: <b>${sourceLayer}</b><br>tiles: <b>${tileOk}</b>`;
            log(`✅ Source loaded`, 'ok');
          }
          if (e.dataType === 'tile' && e.tile) {
            tileOk++;
            updateCounters();
            $(
              'hudTile',
            ).innerHTML = `src: <b>${sourceLayer}</b><br>tiles: <b>${tileOk}</b>`;
          }
        });

        map.on('error', (e) => {
          if (!e.sourceId || e.sourceId !== 'vec-line') return;
          tileErr++;
          updateCounters();
          const msg = e.error?.message || String(e.error) || 'unknown';
          log(`❌ ${msg}`, 'er');
          setStatus('error', `Error (${tileErr})`);
        });

        // Cursor
        map.on('mouseenter', 'line-layer', () => {
          map.getCanvas().style.cursor = 'crosshair';
        });
        map.on('mouseleave', 'line-layer', () => {
          map.getCanvas().style.cursor = '';
        });

        // Click popup
        map.on('click', 'line-layer', (e) => {
          const f = e.features?.[0];
          if (!f) return;
          const props = f.properties ?? {};
          const rows = Object.entries(props)
            .map(
              ([k, v]) => `<span style="color:var(--muted)">${k}</span>: ${v}`,
            )
            .join('<br>');
          new maplibregl.Popup({ closeButton: true, maxWidth: '320px' })
            .setLngLat(e.lngLat)
            .setHTML(rows || '(no properties)')
            .addTo(map);
          log(`Click → ${JSON.stringify(props).slice(0, 80)}`, 'in');
        });
      }

      /* ── applyStyle ──────────────────────────────────────────────────────── */
      function applyStyle() {
        if (!layerActive) return;
        if (!map.getLayer('line-layer')) return;

        const color = $('clrPick').value;
        const width = parseFloat($('lineW').value);
        const opac = parseFloat($('lineOp').value);
        const blur = parseFloat($('lineBlur').value);
        const minZ = parseInt($('minZ').value);
        const dash = $('lineDash').value
          ? $('lineDash').value.split(',').map(Number)
          : null;

        // main line
        map.setPaintProperty('line-layer', 'line-color', color);
        map.setPaintProperty('line-layer', 'line-width', [
          'interpolate',
          ['linear'],
          ['zoom'],
          10,
          width,
          18,
          width * 1.6,
        ]);
        map.setPaintProperty('line-layer', 'line-opacity', opac);
        map.setPaintProperty('line-layer', 'line-blur', blur);
        map.setPaintProperty('line-layer', 'line-dasharray', dash);

        // casing
        map.setPaintProperty('line-layer-casing', 'line-width', [
          'interpolate',
          ['linear'],
          ['zoom'],
          10,
          width + 1.5,
          18,
          width + 2.5,
        ]);
        map.setPaintProperty('line-layer-casing', 'line-opacity', opac * 0.35);

        map.setLayerZoomRange('line-layer', minZ, 24);
        map.setLayerZoomRange('line-layer-casing', minZ, 24);
      }

      /* ── map events ──────────────────────────────────────────────────────── */
      map.on('zoom', () => {
        $('zoomVal').textContent = map.getZoom().toFixed(1);
      });

      map.on('mousemove', (e) => {
        const { lat, lng } = e.lngLat;
        $('hudCoords').textContent = `${lat.toFixed(5)},  ${lng.toFixed(5)}`;
      });

      map.on('load', () => {
        log('Map ready ✔', 'ok');
        setStatus('', 'Map loaded — nhấn ▶ LOAD');
      });

      /* ── fly to ──────────────────────────────────────────────────────────── */
      function fly(lat, lng, zoom) {
        map.flyTo({ center: [lng, lat], zoom, speed: 1.4, curve: 1.2 });
        log(`Fly → [${lat}, ${lng}] z${zoom}`, 'in');
      }
    </script>
  </body>
</html>
